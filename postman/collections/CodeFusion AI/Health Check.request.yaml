$kind: http-request
name: Health Check
method: GET
url: '{{baseUrl}}/'
order: 1000
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status code is 200", function () {
        pm.response.to.have.status(200);
      });

      pm.test("Response body contains 'CodeFusion AI Backend Running'", function () {
        pm.expect(pm.response.text()).to.include("CodeFusion AI Backend Running");
      });
